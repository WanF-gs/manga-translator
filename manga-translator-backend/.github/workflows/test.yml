name: Backend Test Suite

on:
  push:
    branches: [main, develop]
    paths:
      - "manga-translator-backend/**"
  pull_request:
    branches: [main]
    paths:
      - "manga-translator-backend/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manga-translator-backend

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: manga_translator_test
          POSTGRES_USER: manga_user
          POSTGRES_PASSWORD: manga_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U manga_user -d manga_translator_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "manga-translator-backend/services/requirements.txt"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            tesseract-ocr-jpn \
            tesseract-ocr-chi-sim \
            libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/requirements.txt
          pip install -r requirements-dev.txt

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -U manga_user -d manga_translator_test && break
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=services \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=60 \
            --timeout=60 \
            -p no:warnings

      - name: Run integration tests
        run: |
          TEST_DATABASE_URL="postgresql+asyncpg://manga_user:manga_pass@localhost:5432/manga_translator_test" \
          pytest tests/integration/ \
            -v \
            --tb=short \
            --timeout=120 \
            -p no:warnings

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          file: manga-translator-backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload coverage as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            manga-translator-backend/coverage.xml
            manga-translator-backend/htmlcov/

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Unit tests + Integration tests completed" >> $GITHUB_STEP_SUMMARY
          echo "🐍 Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manga-translator-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install ruff==0.6.0

      - name: Run Ruff linter
        run: |
          ruff check services/ --statistics || true
          echo "Lint check completed (warnings are non-blocking for MVP)"
