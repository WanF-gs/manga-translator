[pytest]
# Pytest configuration for manga-translator-backend
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers

asyncio_mode = auto

markers =
    prd: PRD acceptance test marker
    p0: P0 priority test cases
    p1: P1 priority test cases
    p2: P2 priority test cases
    smoke: Smoke test - quick core function verification
    slow: Slow test - full flow test
    unit: Unit test
    integration: Integration test
    e2e: End-to-end test

# Coverage settings
[coverage:run]
source = services
omit =
    services/common/tasks/*
    */tests/*
    */migrations/*
    services/ai_gateway/service/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    raise ImportError

[coverage:html]
directory = htmlcov
