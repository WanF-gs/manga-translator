apiVersion: 1

providers:
  - name: "Manga Translator Dashboards"
    orgId: 1
    folder: "Manga Translator"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
